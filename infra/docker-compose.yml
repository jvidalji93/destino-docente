services:
  db:
    image: postgis/postgis:16-3.4
    container_name: destino-docente-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-destino_docente}
      POSTGRES_USER: ${POSTGRES_USER:-destino}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-destino} -d ${POSTGRES_DB:-destino_docente}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
